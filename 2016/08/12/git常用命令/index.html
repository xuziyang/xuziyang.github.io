        <p>#git配置</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div></pre></td><td class="code"><pre><div class="line">$ git config --global color.ui true</div><div class="line">$ git config --global alias.co checkout</div><div class="line">$ git config --global alias.ci commit</div><div class="line">$ git config --global alias.st status</div><div class="line">$ git config --global alias.br branch</div><div class="line"></div><div class="line"># 列举所有配置</div><div class="line">$ git config -l</div></pre></td></tr></table></figure>
<p>#查看<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div></pre></td><td class="code"><pre><div class="line"># 显示某次提交的内容</div><div class="line">$ git show          </div><div class="line">$ git show $id</div><div class="line"></div><div class="line"># 恢复某次提交的状态，恢复状态本身也提交了一次对象</div><div class="line">$ git revert $id </div><div class="line"></div><div class="line"># 恢复上次提交的状态    </div><div class="line">$ git revert HEAD</div></pre></td></tr></table></figure></p>
<p>#查看文件diff</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line"># 比较当前文件与暂存区的不同</div><div class="line">$ git diff &lt;file&gt;</div></pre></td></tr></table></figure>
<p>#分支</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div></pre></td><td class="code"><pre><div class="line"># 列出所有本地分支</div><div class="line">$ git branch   </div><div class="line"></div><div class="line"># 列出所有远程分支</div><div class="line">$ git branch -r </div><div class="line"></div><div class="line"># 列出所有本地分支和远程分支</div><div class="line">$ git branch -a</div><div class="line"></div><div class="line"># 新建一个分支，但是仍然停留在当前分支</div><div class="line">$ git branch [branch-name] </div><div class="line"></div><div class="line"># 新建一个分支，并切换到该分支</div><div class="line">$ git checkout -b [branch] </div><div class="line"></div><div class="line"># 新建一个分支，并指定一个commit</div><div class="line">$ git branch [branch] [commit]</div><div class="line"></div><div class="line"># 删除一个分支</div><div class="line">$ git branch -d [branch-name] </div><div class="line"></div><div class="line"># 拉取远程分支，到本地分支 并切换到该分支</div><div class="line">$ git branch -b [branch] [remote branch]</div><div class="line"></div><div class="line"># 切换到上一个分支</div><div class="line">$ git checkout -</div><div class="line"></div><div class="line"># 建立追踪关系 在现有分支和远程分支之间</div><div class="line">$ git branch --set-upstream [branch] [remote branch]</div></pre></td></tr></table></figure>
<p>#远程同步<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line"># 查看远程仓库</div><div class="line">$ git remote -v</div></pre></td></tr></table></figure></p>
<p>#撤销</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div></pre></td><td class="code"><pre><div class="line"># 暂时将未提交的变化移除，稍后再移入</div><div class="line">$ git stash </div><div class="line"></div><div class="line"># 命令是恢复stash队列中的stash@&#123;0&#125;，然后从记录就删除</div><div class="line">$ git stash pop</div><div class="line"></div><div class="line"># 丢弃工作区的修改</div><div class="line">$ git checkout -- file</div><div class="line"></div><div class="line"># 把暂存区的修改撤销掉（unstage），重新放回工作区</div><div class="line">$ git reset HEAD file</div></pre></td></tr></table></figure>
<p>#修改<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line"># 修改最后一次提交的注释信息</div><div class="line">$ 修改最后一次提交的信息</div></pre></td></tr></table></figure></p>
